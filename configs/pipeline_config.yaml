# Global Claims Pipeline Configuration

pipeline:
  name: "Car Damage MVP Pipeline"
  version: "1.0.0"
  log_level: "INFO"

models:
  damage_detection:
    weights_path: "models/damage_detection/weights/best.pt"
    conf_threshold: 0.25
    iou_threshold: 0.45
    device: "cpu" # or "cuda"/"mps"

  part_segmentation:
    weights_path: "models/part_segmentation/weights/sam_vit_h.pth"
    conf_threshold: 0.50
    device: "cpu"

  plate_rc_detection:
    weights_path: "models/plate_rc_detection/weights/plate_detector.pt"
    conf_threshold: 0.30

  vlm_reasoning:
    ollama_url: "http://localhost:11434"
    model_name: "qwen2.5vl:7b" # Default fallback judge model
    fallback_model: "gemma4:latest"
    temperature: 0.2
    max_tokens: 2048

database:
  postgres_url: "postgresql://admin:secret@localhost:5433/damage_ai"
  mongodb_url: "mongodb://admin:secret@localhost:27017"

s3:
  bucket_name: "vehicle-claims-storage"
  reports_prefix: "reports/"
  images_prefix: "claims/"
