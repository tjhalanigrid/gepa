vlm:
  model_id: "qwen3.5:9b"               # Ollama model tag (the live brain runs via Ollama)
  ollama_base_url: "http://localhost:11434"
  device: "mps"                        # Apple Silicon MPS; change to "cuda" on GPU host
  max_new_tokens_tool: 1024          # 512 truncated verbose thoughts mid-JSON → parse fails
  max_new_tokens_final: 1024
  # Qwen3.5 "Best Practices" — instruct / non-thinking sampling.
  # thinking MUST stay false: thinking mode spends the whole token budget on
  # <think> and never emits the JSON action (confirmed empty-content truncation).
  thinking: false
  temperature: 0.4              # 0.7 dropped findings at Terminate; 0.2 collapsed to one
                                 # repeated label ("crumpled/severe/95%" on everything). 0.4 is
                                 # the balance — and the orchestrator salvage path now backstops
                                 # any Terminate drops, so temp no longer has to fight that.
  top_p: 0.8
  top_k: 20
  presence_penalty: 1.5               # curbs endless-repetition failure mode
  num_ctx: 8192                       # wider context so multi-image history keeps the system prompt
  do_sample: true
  max_iterations: 6
  codeact_max_retries: 2
  image_max_dim: 640                  # downscale for the multi-turn loop (token budget)
  image_detect_dim: 1024             # higher res for the single damage-detection pass → tighter bboxes

approval:
  # Approval is based on the VISUAL assessment quality (whether the VLM's final
  # damage claims are corroborated by its own detection pass), NOT on cost.
  # There is no cost threshold — cost never gates approval.
  #
  # TEMP: force EVERY report to ESCALATE_TO_HUMAN so we collect verified ground-truth
  # corrections for GEPA. Flip to false to restore normal auto-approve behaviour.
  force_human_review: false

# Where raw trajectories are saved. New folder (separate from the old data/trajectories/raw
# junk, whose images live on teammates' machines and no longer exist locally).
trajectory:
  raw_dir: "data/trajectories/collected"
  reasoning_log_dir: "data/reasoning_logs"

# Qwen (VLM) is the SOLE brain. SAM2 below runs ONLY in the backend to produce the
# segmentation masks and the merged-union (VLM ∪ SAM2) boxes shown in the UI — it is
# NOT a decision tool and carries no damage labels. (No YOLO, no DINOv2 in the path.)
part_segmentation:
  sam2:
    weights_path: "models/damage_detection/models/sam2.1_b.pt"   # stock ultralytics SAM2 base
    device: "mps"
  postprocess:
    min_mask_area_px: 800

plate_rc_detection:
  weights_path: "models/plate_rc_detection/plate.pt"
  device: "cpu"
  enabled: false                        # set to true only when model is ready

database:
  url: "postgresql://localhost:5432/veh_dmg_db"

storage:
  image_upload_dir: "data/uploads/"
  output_dir: "outputs/"

logging:
  level: "INFO"
  format: "%(asctime)s | %(name)s | %(levelname)s | %(message)s"

trajectories:
  raw_dir: "data/trajectories/raw"
  approved_dir: "data/trajectories/approved"
  rejected_dir: "data/trajectories/rejected"
  min_quality_for_sft: 0.60

sft:
  base_model_id: "Qwen/Qwen2-VL-2B-Instruct"
  output_dir: "models/fine_tuned"
  lora_r: 8
  lora_alpha: 16
  epochs: 3
  batch_size: 1
  grad_accumulation: 8
